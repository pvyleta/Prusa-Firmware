# Test Configuration for your MK3S+ settings
# This validates your configuration without requiring hardware

[stepper_x]
step_pin: ar54
dir_pin: ar55
enable_pin: !ar38
microsteps: 16
rotation_distance: 32  # MK3S+ X axis
endstop_pin: ^ar3
position_min: -0.25
position_endstop: 0
position_max: 250  # MK3S+ X max

[stepper_y]
step_pin: ar60
dir_pin: ar61
enable_pin: !ar56
microsteps: 16
rotation_distance: 32  # MK3S+ Y axis
endstop_pin: ^ar14
position_min: -0.25
position_endstop: 0
position_max: 210  # MK3S+ Y max

[stepper_z]
step_pin: ar46
dir_pin: ar48
enable_pin: !ar62
microsteps: 16
rotation_distance: 8  # MK3S+ Z axis (leadscrew)
endstop_pin: ^ar18
position_min: 0.1
position_endstop: 0.5
position_max: 210  # MK3S+ Z max

[extruder]
step_pin: ar26
dir_pin: ar28
enable_pin: !ar24
microsteps: 16
rotation_distance: 22.95981632  # Your calibrated MK3S+ extruder value
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ar10
sensor_type: EPCOS 100K B57560G104F
sensor_pin: analog13
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
min_extrude_temp: 0  # Allow cold extrusion for testing
max_temp: 285
pressure_advance: 0.052  # Your calibrated PA value

[heater_bed]
heater_pin: ar8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: analog14
control: pid
pid_Kp: 126.13  # Your calibrated bed PID values
pid_Ki: 4.3
pid_Kd: 924.76
min_temp: 0
max_temp: 120

[fan]
pin: ar9

[mcu]
serial: /tmp/klipper_host_mcu

[printer]
kinematics: cartesian
# Using your MK3S+ settings
max_velocity: 300
max_accel: 4000
minimum_cruise_ratio: 0.5
max_z_velocity: 12
max_z_accel: 200

[virtual_sdcard]
path: /tmp

[display_status]

[pause_resume]
